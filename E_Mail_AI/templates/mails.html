<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisMail</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mails.css') }}">
    <script>
        document.documentElement.dataset.theme = "dark";
        localStorage.setItem("mailai-theme", "dark");
    </script>
</head>
<body>
    <main class="workspace">
        <header class="topbar">
            <div class="brand-lockup">
                <img src="{{ url_for('static', filename='img/sistekno/SisMail.png') }}" alt="SisMail">
            </div>
        </header>

        <section class="chat-shell">
            <div class="chat-container">
                <div class="chat-messages">
                    {% if mails_chat_history %}
                        {% for msg in mails_chat_history %}
                            <div class="chat-row {{ msg.role }}">
                                <div class="chat-bubble" data-animate-ai="{{ 'true' if loop.last and msg.role == 'ai' else 'false' }}">
                                    {{ msg.content }}
                                </div>
                            </div>
                        {% endfor %}
                    {% else %}
                        <div class="chat-empty-card">
                            <h2>Mailler hakkında soru sorun</h2>
                        </div>
                    {% endif %}
                </div>

                <form method="POST" class="chat-input-area">
                    <input type="hidden" name="action" value="mails_chat">
                    <textarea name="user_message"
                              placeholder="Mailler hakkında soru sor..."
                              required></textarea>
                    <button type="submit">Gönder</button>
                </form>
            </div>

        </section>
    </main>

    <script>
        const chatInputForm = document.querySelector(".chat-input-area");
        const chatTextarea = chatInputForm ? chatInputForm.querySelector("textarea") : null;

        if (chatTextarea) {
            chatTextarea.addEventListener("keydown", (event) => {
                if (event.key === "Enter" && !event.shiftKey) {
                    event.preventDefault();

                    if (chatInputForm && chatInputForm.checkValidity()) {
                        chatInputForm.requestSubmit();
                    }
                }
            });
        }

        function scrollChatToBottom(chatMessages) {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function typeAiMessage(bubble) {
            const message = bubble.textContent.trim();

            if (!message) {
                return;
            }

            bubble.textContent = "";
            bubble.classList.add("is-typing");

            let index = 0;
            const speed = 18;

            function writeNextCharacter() {
                bubble.textContent += message.charAt(index);
                index += 1;
                scrollChatToBottom(bubble.closest(".chat-messages"));

                if (index < message.length) {
                    window.setTimeout(writeNextCharacter, speed);
                } else {
                    bubble.classList.remove("is-typing");
                }
            }

            writeNextCharacter();
        }

        function createTypingIndicator() {
            const row = document.createElement("div");
            row.className = "chat-row ai pending-ai";
            row.innerHTML = `
                <div class="chat-bubble typing-indicator" aria-label="MailAI cevap hazırlıyor">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            return row;
        }

        const chatMessages = document.querySelector(".chat-messages");
        const chatForm = document.querySelector(".chat-input-area");
        const latestAiBubble = document.querySelector('[data-animate-ai="true"]');

        if (chatMessages) {
            scrollChatToBottom(chatMessages);
        }

        if (latestAiBubble) {
            typeAiMessage(latestAiBubble);
        }

        if (chatForm && chatMessages) {
            chatForm.addEventListener("submit", (event) => {
                if (!chatForm.checkValidity()) {
                    return;
                }

                event.preventDefault();

                const textarea = chatForm.querySelector("textarea");
                const button = chatForm.querySelector("button");
                const message = textarea.value.trim();

                const emptyMessage = chatMessages.querySelector(".chat-empty");
                if (emptyMessage) {
                    emptyMessage.remove();
                }

                if (message) {
                    const userRow = document.createElement("div");
                    userRow.className = "chat-row user";
                    userRow.innerHTML = `<div class="chat-bubble"></div>`;
                    userRow.querySelector(".chat-bubble").textContent = message;
                    chatMessages.append(userRow, createTypingIndicator());
                    scrollChatToBottom(chatMessages);
                }

                textarea.readOnly = true;
                button.disabled = true;
                button.textContent = "Yazıyor...";

                window.setTimeout(() => chatForm.submit(), 120);
            });
        }
    </script>
</body>
</html>
